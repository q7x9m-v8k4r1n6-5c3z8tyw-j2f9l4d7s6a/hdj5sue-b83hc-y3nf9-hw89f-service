name: CD

on:
  workflow_run:
    workflows: [ CI ]
    types: [ completed ]
    branches: [ feature/ci-cd-setup ]

env:
  IMAGE_NAME: ovcmove-backend
  AZURE_APP_DIR: /app/ovcmove

jobs:
  publish-docker-image:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.event.workflow_run.head_sha }}

  deploy-to-azure:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    needs: publish-docker-image
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set environment variables for compose
        run: |
          echo "DOCKER_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.event.workflow_run.head_sha }}" >> $GITHUB_ENV
          echo "OVCMOVE_DbConfig__SQLServer__ConnectionString=${{ secrets.DB_CONNECTION_STRING }}" >> $GITHUB_ENV
          echo "OVCMOVE_ExternalServicesConfig__EmailService__Email=${{ secrets.EMAIL_SERVICE_EMAIL }}" >> $GITHUB_ENV
          echo "OVCMOVE_ExternalServicesConfig__EmailService__Password=${{ secrets.EMAIL_SERVICE_PASSWORD }}" >> $GITHUB_ENV

      - name: Prepare Azure app directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          script: mkdir -p ${{ env.AZURE_APP_DIR }}

      - name: Copy compose file to Azure VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          source: docker-compose.yml
          target: ${{ env.AZURE_APP_DIR }}

      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.0.3
        env:
          DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.event.workflow_run.head_sha }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          OVCMOVE_DbConfig__SQLServer__ConnectionString: ${{ secrets.DB_CONNECTION_STRING }}
          OVCMOVE_ExternalServicesConfig__EmailService__Email: ${{ secrets.EMAIL_SERVICE_EMAIL }}
          OVCMOVE_ExternalServicesConfig__EmailService__Password: ${{ secrets.EMAIL_SERVICE_PASSWORD }}
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          envs: DOCKER_IMAGE,DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,OVCMOVE_DbConfig__SQLServer__ConnectionString,OVCMOVE_ExternalServicesConfig__EmailService__Email,OVCMOVE_ExternalServicesConfig__EmailService__Password
          script: |
            cd ${{ env.AZURE_APP_DIR }}
            {
              printf 'DOCKER_IMAGE=%s\n' "$DOCKER_IMAGE"
              printf 'OVCMOVE_DbConfig__SQLServer__ConnectionString=%s\n' "$OVCMOVE_DbConfig__SQLServer__ConnectionString"
              printf 'OVCMOVE_ExternalServicesConfig__EmailService__Email=%s\n' "$OVCMOVE_ExternalServicesConfig__EmailService__Email"
              printf 'OVCMOVE_ExternalServicesConfig__EmailService__Password=%s\n' "$OVCMOVE_ExternalServicesConfig__EmailService__Password"
            } > .env
            printf '%s' "$DOCKERHUB_TOKEN" | docker login --username "$DOCKERHUB_USERNAME" --password-stdin
            docker pull "$DOCKER_IMAGE"
            docker compose --env-file .env up -d
            docker image prune -f
