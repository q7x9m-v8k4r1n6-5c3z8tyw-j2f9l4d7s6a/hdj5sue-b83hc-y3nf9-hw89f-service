name: CD

on:
  workflow_run:
    workflows: [ CI ]
    types: [ completed ]
    branches: [ main ]

env:
  IMAGE_NAME: ovcmove-backend
  AZURE_APP_DIR: /app/ovcmove

jobs:
  publish-docker-image:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.COMMIT_SHA }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.COMMIT_SHA }}

  deploy-to-azure:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    needs: publish-docker-image
    env:
      COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.COMMIT_SHA }}

      # TEMP DEBUG: remove after verifying the repository secret is available.
      - name: Debug JWT access-token expiration secret
        env:
          JWT_ACCESS_TOKEN_EXPIRATION_MINUTES: ${{ secrets.JWT_ACCESS_TOKEN_EXPIRATION_MINUTES }}
        run: |
          echo "JWT_ACCESS_TOKEN_EXPIRATION_MINUTES=$JWT_ACCESS_TOKEN_EXPIRATION_MINUTES"

      - name: Prepare Azure app directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          password: ${{ secrets.AZURE_VM_PASSWORD }}
          script: mkdir -p ${{ env.AZURE_APP_DIR }}

      - name: Copy compose file to Azure VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          password: ${{ secrets.AZURE_VM_PASSWORD }}
          source: docker-compose.yml
          target: ${{ env.AZURE_APP_DIR }}

      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.0.3
        env:
          DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.COMMIT_SHA }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
          EMAIL_SERVICE_EMAIL: ${{ secrets.EMAIL_SERVICE_EMAIL }}
          EMAIL_SERVICE_PASSWORD: ${{ secrets.EMAIL_SERVICE_PASSWORD }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          JWT_ISSUER: ${{ secrets.JWT_ISSUER }}
          JWT_AUDIENCE: ${{ secrets.JWT_AUDIENCE }}
          JWT_ACCESS_TOKEN_EXPIRATION_MINUTES: ${{ secrets.JWT_ACCESS_TOKEN_EXPIRATION_MINUTES }}
          JWT_REFRESH_TOKEN_EXPIRATION_DAYS: ${{ secrets.JWT_REFRESH_TOKEN_EXPIRATION_DAYS }}
          JWT_SIGNING_KEY_ID: ${{ secrets.JWT_SIGNING_KEY_ID }}
          JWT_PREVIOUS_SIGNING_KEY_ID: ${{ secrets.JWT_PREVIOUS_SIGNING_KEY_ID }}
          JWT_PREVIOUS_SECRET_KEY: ${{ secrets.JWT_PREVIOUS_SECRET_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          password: ${{ secrets.AZURE_VM_PASSWORD }}
          envs: DOCKER_IMAGE,DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,OVCMOVE_DbConfig__SQLServer__ConnectionString,OVCMOVE_ExternalServicesConfig__EmailService__Email,OVCMOVE_ExternalServicesConfig__EmailService__Password,OVCMOVE_JwtConfig__SecretKey,OVCMOVE_JwtConfig__Issuer,OVCMOVE_JwtConfig__Audience,OVCMOVE_JwtConfig__AccessTokenExpirationMinutes,OVCMOVE_JwtConfig__RefreshTokenExpirationDays,OVCMOVE_JwtConfig__SigningKeyId,OVCMOVE_JwtConfig__PreviousSigningKeyId,OVCMOVE_JwtConfig__PreviousSecretKey,OVCMOVE_GoogleAuthConfig__ClientId
          script: |
            cd ${{ env.AZURE_APP_DIR }}
            cat > .env <<EOF
            DOCKER_IMAGE=$DOCKER_IMAGE
            OVCMOVE_DbConfig__SQLServer__ConnectionString=$DB_CONNECTION_STRING
            OVCMOVE_ExternalServicesConfig__EmailService__Email=$EMAIL_SERVICE_EMAIL
            OVCMOVE_ExternalServicesConfig__EmailService__Password=$EMAIL_SERVICE_PASSWORD
            OVCMOVE_JwtConfig__SecretKey=$JWT_SECRET_KEY
            OVCMOVE_JwtConfig__Issuer=$JWT_ISSUER
            OVCMOVE_JwtConfig__Audience=$JWT_AUDIENCE
            OVCMOVE_JwtConfig__AccessTokenExpirationMinutes=$JWT_ACCESS_TOKEN_EXPIRATION_MINUTES
            OVCMOVE_JwtConfig__RefreshTokenExpirationDays=$JWT_REFRESH_TOKEN_EXPIRATION_DAYS
            OVCMOVE_JwtConfig__SigningKeyId=$JWT_SIGNING_KEY_ID
            OVCMOVE_JwtConfig__PreviousSigningKeyId=$JWT_PREVIOUS_SIGNING_KEY_ID
            OVCMOVE_JwtConfig__PreviousSecretKey=$JWT_PREVIOUS_SECRET_KEY
            OVCMOVE_GoogleAuthConfig__ClientId=$GOOGLE_CLIENT_ID
            EOF
            docker login --username "$DOCKERHUB_USERNAME" --password-stdin <<EOF
            $DOCKERHUB_TOKEN
            EOF
            docker pull "$DOCKER_IMAGE"
            docker compose --env-file .env up -d
            docker image prune -f
